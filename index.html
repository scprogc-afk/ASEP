<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ΑΣΕΠ Quiz App - Προετοιμασία</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-tr from-[#112240] via-[#1a365d] to-[#2a5298] min-h-screen text-gray-800 flex justify-center items-center p-4">

    <div id="app" class="w-full max-w-[550px] bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden min-h-[650px] flex flex-col">
        <div class="bg-gradient-to-r from-[#1a365d] to-[#2b6cb0] p-5 text-white flex items-center justify-between">
            <h1 class="font-extrabold text-lg">ΑΣΕΠ QUIZ</h1>
        </div>

        <div id="menu-screen" class="flex-1 p-6">
            <h2 class="text-xl font-extrabold text-[#1a365d] mb-4">Επιλογή Ενότητας</h2>
            <div id="category-list" class="space-y-3">
                <button onclick="chooseCategory('Συνταγματικό Δίκαιο')" class="w-full text-left bg-white border p-4 rounded-2xl shadow-sm hover:border-blue-500 transition-all">
                    Συνταγματικό Δίκαιο
                </button>
                <button onclick="chooseCategory('Διοικητικό Δίκαιο')" class="w-full text-left bg-white border p-4 rounded-2xl shadow-sm hover:border-blue-500 transition-all">
                    Διοικητικό Δίκαιο
                </button>
                </div>
        </div>

        <div id="options-screen" class="hidden flex-1 p-6">...</div>
        <div id="quiz-screen" class="hidden flex-1 p-6">...</div>
        <div id="results-screen" class="hidden flex-1 p-6">...</div>
    </div>

    <script>
        // Χάρτης αντιστοίχισης ενότητας με αρχείο JSON
        const CATEGORY_FILES = {
            "Συνταγματικό Δίκαιο": "1_Συνταγματικό Δίκαιο.json",
            "Διοικητικό Δίκαιο": "2_Διοικητικό Δίκαιο.json",
            "Ευρωπαϊκοί Θεσμοί και Δίκαιο": "3_Ευρωπαϊκοί Θεσμοί και Δίκαιο.json",
            "Οικονομικές Επιστήμες": "4_Οικονομικές Επιστήμες.json",
            "Πληροφορική και Ψηφιακή Διακυβέρνηση": "5_Πληροφορική και Ψηφιακή Διακυβέρνηση.json",
            "Σύγχρονη Ιστορία της Ελλάδας (1864 - σήμερα)": "6_Σύγχρονη Ιστορία της Ελλάδας.json",
            "Κώδικας Κατάστασης Πολιτικών Διοικητικών Υπαλλήλων και Υπαλλήλων Ν.Π.Δ.Δ.": "7_Κώδικες.json",
            "Γενικός Κανονισμός για την Προστασία Δεδομένων (GDPR)": "8_gdpr.json",
            "Διοίκηση Επιχειρήσεων και Οργανισμών": "9_Διοίκηση Επιχειρήσεων και Οργανισμών.json",
            "Διοίκηση Ανθρώπινου Δυναμικού": "10_Διοίκηση Ανθρώπινου Δυναμικού.json",
            "Κώδικας Συμπεριφοράς Δημοσίων Υπαλλήλων": "11_Κώδικας Συμπεριφοράς Δημοσίων Υπαλλήλων.json"
        };

        let QUESTIONS_DATABASE = {};
        let state = { currentCategory: "", questions: [], currentQuestionIndex: 0, score: { correct: 0, wrong: 0 } };

        async function chooseCategory(categoryName) {
            const filename = CATEGORY_FILES[categoryName];
            
            try {
                // Φόρτωση του αρχείου αυτόματα
                const response = await fetch(filename);
                if (!response.ok) throw new Error('Αποτυχία φόρτωσης αρχείου');
                
                const data = await response.json();
                QUESTIONS_DATABASE[categoryName] = data; 
                
                state.currentCategory = categoryName;
                state.totalCount = data.length;
                
                // Μετάβαση στο επόμενο screen
                document.getElementById('selected-cat-title').innerText = categoryName;
                document.getElementById('selected-cat-count').innerText = `Διαθέσιμες ερωτήσεις: ${state.totalCount}`;
                showScreen('options');
            } catch (error) {
                alert(`Σφάλμα: Δεν βρέθηκε το αρχείο ${filename}. Βεβαιώσου ότι είναι στον ίδιο φάκελο.`);
                console.error(error);
            }
        }

        function showScreen(screenId) {
            document.querySelectorAll('div[id$="-screen"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId + '-screen').classList.remove('hidden');
        }
        
        // ... υπόλοιπες συναρτήσεις (startPractice, renderQuestion, κλπ παραμένουν ίδιες)
    </script>
</body>
</html>
