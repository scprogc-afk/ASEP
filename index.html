<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ΑΣΕΠ Quiz App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-tr from-[#112240] to-[#2a5298] min-h-screen flex justify-center items-center p-4">

    <!-- App Container -->
    <div id="app" class="w-full max-w-[550px] bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden min-h-[600px] flex flex-col">
        <div class="bg-[#1a365d] p-6 text-white text-center font-extrabold text-xl shadow-md">ΑΣΕΠ QUIZ</div>

        <!-- Screens Container -->
        <div class="flex-1 p-6">

            <!-- Menu Screen -->
            <div id="menu-screen" class="space-y-3">
                <h2 class="text-lg font-bold text-slate-800 mb-4">Επιλογή Ενότητας</h2>
                <div id="menu-list" class="space-y-2"></div>
            </div>

            <!-- Mode Screen (Hidden by default) -->
            <div id="mode-screen" class="hidden space-y-4"></div>

            <!-- Quiz Screen (Hidden by default) -->
            <div id="quiz-screen" class="hidden"></div>

            <!-- Results Screen (Hidden by default) -->
            <div id="results-screen" class="hidden text-center p-6"></div>
        </div>
    </div>

    <script>
        const CATEGORY_FILES = {
            "Συνταγματικό Δίκαιο": "syn.json",
            "Διοικητικό Δίκαιο": "didik.json",
            "Ευρωπαϊκοί Θεσμοί και Δίκαιο": "euro.json",
            "Οικονομικές Επιστήμες": "economy.json",
            "Πληροφορική και Ψηφιακή Διακυβέρνηση": "it.json",
            "Σύγχρονη Ιστορία της Ελλάδας (1864 - σήμερα)": "history.json",
            "Κώδικας Κατάστασης Πολιτικών Διοικητικών Υπαλλήλων": "codes.json",
            "Γενικός Κανονισμός για την Προστασία Δεδομένων (GDPR)": "gdpr.json",
            "Διοίκηση Επιχειρήσεων και Οργανισμών": "admin.json",
            "Διοίκηση Ανθρώπινου Δυναμικού": "10_Διοίκηση Ανθρώπινου Δυναμικού.json",
            "Κώδικας Συμπεριφοράς Δημοσίων Υπαλλήλων": "11_Κώδικας Συμπεριφοράς Δημοσίων Υπαλλήλων.json"
        };

        let state = { questions: [], currentIdx: 0, score: 0, selectedCat: "" };

        // Αρχικοποίηση μενού
        document.addEventListener('DOMContentLoaded', () => {
            const menuList = document.getElementById('menu-list');
            menuList.innerHTML = Object.keys(CATEGORY_FILES).map(cat => `
                <button onclick="selectCategory('${cat}')" class="w-full text-left bg-white border border-slate-200 hover:border-blue-500 hover:bg-blue-50 p-4 rounded-xl shadow-sm transition-all font-semibold text-slate-700">
                    ${cat}
                </button>
            `).join('');
        });

        function showScreen(id) {
            ['menu-screen', 'mode-screen', 'quiz-screen', 'results-screen'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function selectCategory(cat) {
            state.selectedCat = cat;
            const screen = document.getElementById('mode-screen');
            screen.innerHTML = `
                <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">Ενότητα: ${cat}</h2>
                <button onclick="startQuiz('all')" class="w-full p-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg mb-3">Όλες οι ερωτήσεις</button>
                <button onclick="startQuiz('random')" class="w-full p-4 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 shadow-lg mb-6">20 Random</button>
                <button onclick="showScreen('menu-screen')" class="w-full p-4 border border-slate-300 rounded-xl hover:bg-slate-50">Πίσω</button>
            `;
            showScreen('mode-screen');
        }

        async function startQuiz(mode) {
            const path = '/static/' + CATEGORY_FILES[state.selectedCat];
            try {
                const res = await fetch(path);
                let data = await res.json();
                state.questions = (mode === 'random') ? data.sort(() => 0.5 - Math.random()).slice(0, 20) : data;
                state.currentIdx = 0;
                state.score = 0;
                renderQuestion();
            } catch(e) { alert("Σφάλμα: Βεβαιώσου ότι ο Flask server τρέχει και το αρχείο υπάρχει στο /static/"); }
        }

        function renderQuestion() {
            const q = state.questions[state.currentIdx];
            const screen = document.getElementById('quiz-screen');
            screen.innerHTML = `
                <div class="flex justify-between text-xs font-bold text-slate-400 mb-4 uppercase">
                    <span>Ερώτηση ${state.currentIdx + 1} από ${state.questions.length}</span>
                    <button onclick="location.reload()" class="text-rose-500 underline">Έξοδος</button>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-6">${q.question}</h3>
                <div class="space-y-3">
                    ${Object.entries(q.options).map(([k, v]) => `
                        <button onclick="checkAnswer('${k}')" class="w-full p-4 border border-slate-200 rounded-xl hover:bg-slate-50 text-left transition-all font-medium text-slate-700">
                            <span class="text-blue-600 font-bold mr-2">${k.toUpperCase()}:</span> ${v}
                        </button>
                    `).join('')}
                </div>
                <div id="feedback" class="mt-6 hidden p-4 rounded-xl text-center font-bold"></div>
            `;
            showScreen('quiz-screen');
        }

        function checkAnswer(k) {
            const q = state.questions[state.currentIdx];
            const fb = document.getElementById('feedback');
            const isCorrect = (k === q.correct_answer);
            if(isCorrect) state.score++;

            fb.innerText = isCorrect ? "ΣΩΣΤΑ! ✅" : `ΛΑΘΟΣ! Σωστή: ${q.correct_answer.toUpperCase()}`;
            fb.className = `mt-6 p-4 rounded-xl text-center font-bold ${isCorrect ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}`;
            fb.classList.remove('hidden');

            setTimeout(() => {
                state.currentIdx++;
                if(state.currentIdx < state.questions.length) renderQuestion();
                else showResults();
            }, 1200);
        }

        function showResults() {
            document.getElementById('results-screen').innerHTML = `
                <h2 class="text-2xl font-bold mb-4">Ολοκληρώθηκε!</h2>
                <p class="text-xl mb-8">Σκορ: <span class="font-bold">${state.score} / ${state.questions.length}</span></p>
                <button onclick="location.reload()" class="w-full p-4 bg-slate-900 text-white rounded-xl font-bold">Αρχική Σελίδα</button>
            `;
            showScreen('results-screen');
        }
    </script>
</body>
</html>
